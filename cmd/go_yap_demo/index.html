<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="X-UA-Compatible" content="ie=edge" />
        <title>Go WebSocket Tutorial</title>
        <script src="/yap/client.js"></script>
    </head>
    <body>
        <script>
            YAP.subscribe("yap.log", render_yap_log, 100);
            function render_yap_log(...tokens) {
                let will_add = tokens.map((v) => v.V).join("");
                console.log(will_add);
                document.body.innerHTML += will_add;
            }
        </script>
    </body>
</html>
